<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Publisher · Admin</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%237c6af7'/%3E%3C/svg%3E" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0f0f13;
    --surface: #18181f;
    --border:  rgba(255,255,255,0.08);
    --text:    #e8e8f0;
    --muted:   #888899;
    --accent:  #7c6af7;
    --green:   #22c55e;
    --amber:   #f59e0b;
    --red:     #ef4444;
    --blue:    #3b82f6;
    --radius:  12px;
  }

  body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif;
         font-size: 14px; line-height: 1.6; min-height: 100vh; }

  #login-screen { display: flex; flex-direction: column; align-items: center;
                  justify-content: center; height: 100vh; gap: 12px; }
  #login-screen input { background: var(--surface); border: 1px solid var(--border);
                        color: var(--text); padding: 10px 14px; border-radius: 8px;
                        font-size: 14px; width: 280px; }
  #login-screen .btn-primary { width: 100%; justify-content: center; padding: 10px 28px; font-size: 14px; }

  #app { display: none; max-width: 1100px; margin: 0 auto; padding: 32px 16px; }

  .studio-table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 12px 0; }
  .studio-table th, .studio-table td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .studio-table th { color: var(--muted); font-weight: 500; text-transform: uppercase; font-size: 10px; letter-spacing: .4px; }
  .studio-subtabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
  .studio-subtabs .tab { border-bottom: 2px solid transparent; }
  .studio-type-pane { display: none; }
  .studio-type-pane.active { display: block; }
  .img-meta { font-size: 11px; color: var(--muted); margin: 6px 0; line-height: 1.5; }

  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  header h1 { font-size: 18px; font-weight: 500; }

  .tabs { display: flex; gap: 2px; margin-bottom: 24px;
          border-bottom: 1px solid var(--border); }
  .tab  { padding: 8px 16px; cursor: pointer; color: var(--muted); font-size: 13px;
          border-bottom: 2px solid transparent; transition: color .15s; }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }

  .pane { display: none; }
  .pane.active { display: block; }

  .btn { display: inline-flex; align-items: center; gap: 6px; border: none; cursor: pointer;
         border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 500; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary  { background: var(--accent); color: #fff; }
  .btn-ghost    { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-amber    { background: var(--amber); color: #000; }
  .btn-danger   { background: transparent; color: var(--red); border: 1px solid var(--red); }
  .btn-sm       { padding: 4px 10px; font-size: 12px; }

  .card { background: var(--surface); border: 1px solid var(--border);
          border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
  .card-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .badge { display: inline-block; padding: 2px 9px; border-radius: 20px;
           font-size: 11px; font-weight: 600; letter-spacing: .3px; }
  .badge-pending    { background: rgba(245,158,11,.15); color: var(--amber); }
  .badge-processing { background: rgba(59,130,246,.15); color: var(--blue); }
  .badge-scheduled  { background: rgba(124,106,247,.15); color: var(--accent); }
  .badge-draft      { background: rgba(136,136,153,.15); color: var(--muted); }
  .badge-published  { background: rgba(34,197,94,.15); color: var(--green); }
  .badge-failed     { background: rgba(239,68,68,.15); color: var(--red); }

  .caption-box { background: rgba(255,255,255,.04); border-radius: 8px; padding: 12px;
                 white-space: pre-wrap; font-size: 13px; margin: 10px 0; color: var(--text); }
  .caption-box.empty { color: var(--muted); font-style: italic; }

  textarea, input, select {
    background: rgba(255,255,255,.05); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 9px 12px; font-size: 13px;
    font-family: inherit; width: 100%; outline: none; transition: border-color .15s;
  }
  textarea:focus, input:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; line-height: 1.6; }

  .actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .error-box { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2);
               border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--red);
               font-family: monospace; margin-top: 8px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .form-grid.full { grid-template-columns: 1fr; }
  label.field { display: flex; flex-direction: column; gap: 5px; }
  label.field span { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

  .char-count { text-align: right; font-size: 11px; color: var(--muted); }

  .toggle-row { display: flex; align-items: center; justify-content: space-between;
                padding: 12px 0; border-bottom: 1px solid var(--border); }
  .toggle-row:last-child { border-bottom: none; }
  .toggle-info { display: flex; flex-direction: column; gap: 2px; }
  .toggle-info strong { font-size: 13px; font-weight: 500; }
  .toggle-info small { font-size: 12px; color: var(--muted); }

  .toggle { position: relative; width: 38px; height: 22px; flex-shrink: 0; cursor: pointer; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: rgba(255,255,255,.1);
            border-radius: 11px; transition: background .2s; }
  .slider::before { content:''; position: absolute; height: 16px; width: 16px; left: 3px; top: 3px;
                    background: #fff; border-radius: 50%; transition: transform .2s; }
  .toggle input:checked + .slider { background: var(--green); }
  .toggle input:checked + .slider::before { transform: translateX(16px); }

  .match-label { font-size: 12px; color: var(--muted); }
  .preview-img { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; margin: 8px 0; }
  .x-link { font-size: 12px; color: var(--blue); text-decoration: none; }
  .x-link:hover { text-decoration: underline; }

  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

  .empty-state { text-align: center; color: var(--muted); padding: 48px; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border);
             border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="login-screen">
  <form id="login-form" action="#" method="post" style="display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:320px" autocomplete="on">
    <h2 style="font-size:16px;font-weight:500">Social Publisher</h2>
    <!-- Satisfies Chrome a11y hint: password forms should include a username field (can be visually hidden). -->
    <label class="sr-only" for="login-username">Username</label>
    <input id="login-username" name="username" type="text" autocomplete="username" value="admin" tabindex="-1" aria-hidden="true"
      style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0">
    <label class="field" style="width:100%;margin:0">
      <span>Admin secret</span>
      <input id="secret-input" name="password" type="password" placeholder="Admin secret" autocomplete="current-password" autofocus>
    </label>
    <button type="submit" id="login-btn" class="btn btn-primary" style="width:100%">Sign in</button>
    <p id="login-err" style="color:var(--red);font-size:12px;display:none;text-align:center">Incorrect secret.</p>
  </form>
</div>

<div id="app">
  <header>
    <h1>Social Publisher</h1>
    <button type="button" class="btn btn-primary" data-tab="announce">+ New announcement</button>
  </header>

  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="queue">Queue</div>
    <div class="tab" data-tab="history">History</div>
    <div class="tab" data-tab="announce">Announce</div>
    <div class="tab" data-tab="policies">Policies</div>
    <div class="tab" data-tab="studio">Studio</div>
  </div>

  <div id="pane-queue"    class="pane active"></div>
  <div id="pane-history"  class="pane"></div>
  <div id="pane-announce" class="pane"></div>
  <div id="pane-policies" class="pane"></div>
  <div id="pane-studio"   class="pane"></div>
</div>

<script>
let TOKEN = ''
/** @type {Map<string, object>} */
const postsById = new Map()
let activeListPane = 'queue'

const AI_IMAGE_POST_TYPES = new Set(['final_score', 'player_of_game', 'weekly_power_rankings'])
const STUDIO_STYLE_PACKS = [
  'regular', 'playoffs', 'rivalry', 'sponsor_safe',
  'regular_season_launch', 'stage_combine_playground',
]
/** @type {{ final_score_matches: any[], player_of_game: any[], power_rankings: { teams: any[], league_logo?: string } } | null} */
let studioSuggestions = null
let studioPaneReady = false

async function login() {
  const secret = document.getElementById('secret-input').value.trim()
  const res = await fetch('/api/posts?mode=queue', {
    headers: { Authorization: `Bearer ${secret}` }
  })
  if (res.status === 401) {
    document.getElementById('login-err').style.display = 'block'
    return
  }
  TOKEN = secret
  try { sessionStorage.setItem('sp_admin', TOKEN) } catch (_) {}
  document.getElementById('login-screen').style.display = 'none'
  document.getElementById('app').style.display = 'block'
  loadQueue()
  loadPolicies()
  showOAuthReturnBanner()
}

document.getElementById('login-form').addEventListener('submit', e => {
  e.preventDefault()
  login()
})

async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
    ...opts
  })
  if (!res.ok) {
    const t = await res.text()
    try {
      const j = JSON.parse(t)
      if (j?.error) throw new Error(String(j.error))
    } catch (e) {
      if (e instanceof SyntaxError) {
        const proxyHint =
          res.status === 502 || res.status === 504
            ? ' If this appeared after a long wait, your host may have timed out the request (image generation often needs 60–120s). Try locally or raise the deployment HTTP timeout.'
            : ''
        throw new Error(
          (t && t.length && t.length < 500 ? t.trim() : `HTTP ${res.status}`) + proxyHint
        )
      }
      throw e
    }
    throw new Error(t)
  }
  return res.json()
}

function showOAuthReturnBanner() {
  const p = new URLSearchParams(window.location.search)
  const st = p.get('x_oauth')
  if (!st) return
  const detail = p.get('detail')
  const lines = {
    ok: 'X account linked for this league.',
    denied: 'X authorization was cancelled.',
    invalid: 'OAuth session expired or invalid — try “Link X” again.',
    db_error: 'Saved tokens failed: ' + (detail || 'database error'),
    token_error: 'X token exchange failed: ' + (detail || 'unknown'),
  }
  const msg = lines[st] || st
  const el = document.createElement('div')
  el.style.cssText = 'position:fixed;top:16px;right:16px;max-width:min(420px,92vw);padding:12px 14px;border-radius:10px;font-size:13px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.4);border:1px solid var(--border);background:var(--surface);color:var(--text)'
  el.style.borderLeft = st === 'ok' ? '3px solid var(--green)' : '3px solid var(--amber)'
  el.textContent = msg
  document.body.appendChild(el)
  setTimeout(() => el.remove(), 8000)
  p.delete('x_oauth')
  p.delete('detail')
  const q = p.toString()
  window.history.replaceState({}, '', q ? `${window.location.pathname}?${q}` : window.location.pathname)
}

async function bootstrapSession() {
  let saved = ''
  try { saved = sessionStorage.getItem('sp_admin') || '' } catch (_) {}
  if (!saved) return
  const res = await fetch('/api/posts?mode=queue', {
    headers: { Authorization: `Bearer ${saved}` }
  })
  if (res.status === 401) {
    try { sessionStorage.removeItem('sp_admin') } catch (_) {}
    return
  }
  TOKEN = saved
  document.getElementById('login-screen').style.display = 'none'
  document.getElementById('app').style.display = 'block'
  loadQueue()
  loadPolicies()
  showOAuthReturnBanner()
}

async function linkXAccount(leagueId) {
  const res = await fetch('/api/x/oauth/start', {
    method: 'POST',
    headers: { Authorization: `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ league_id: leagueId })
  })
  const data = await res.json().catch(() => ({}))
  if (!res.ok) throw new Error(data.error || res.statusText)
  if (!data.url) throw new Error('No redirect URL from server')
  window.location.href = data.url
}

function showTab(name) {
  document.querySelectorAll('#tabs .tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === name)
  })
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'))
  document.getElementById(`pane-${name}`).classList.add('active')

  if (name === 'queue') { activeListPane = 'queue'; loadQueue() }
  else if (name === 'history') { activeListPane = 'history'; loadHistory() }
  else if (name === 'announce') renderAnnounceForm()
  else if (name === 'policies') loadPolicies()
  else if (name === 'studio') loadStudioPane()
}

document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab[data-tab]')
  if (tab) showTab(tab.dataset.tab)
})
document.querySelector('header').addEventListener('click', e => {
  const b = e.target.closest('[data-tab]')
  if (b && b.dataset.tab) showTab(b.dataset.tab)
})

async function loadQueue() {
  const el = document.getElementById('pane-queue')
  el.innerHTML = '<div class="empty-state"><div class="spinner"></div></div>'
  const posts = await api('/api/posts?mode=queue')
  el.innerHTML = ''
  posts.forEach(p => postsById.set(p.id, p))
  if (!posts.length) { el.innerHTML = '<div class="empty-state">Queue is empty.</div>'; return }
  posts.forEach(p => el.appendChild(renderPostCard(p, 'queue')))
}

async function loadHistory() {
  const el = document.getElementById('pane-history')
  el.innerHTML = '<div class="empty-state"><div class="spinner"></div></div>'
  const posts = await api('/api/posts?mode=history')
  el.innerHTML = ''
  posts.forEach(p => postsById.set(p.id, p))
  if (!posts.length) { el.innerHTML = '<div class="empty-state">No history yet.</div>'; return }
  posts.forEach(p => el.appendChild(renderPostCard(p, 'history')))
}

const STATUS_BADGE = {
  pending: 'badge-pending', processing: 'badge-processing', scheduled: 'badge-scheduled',
  draft: 'badge-draft', published: 'badge-published', failed: 'badge-failed'
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
}

function renderPostCard(post, pane) {
  const card = document.createElement('div')
  card.className = 'card'
  card.dataset.postId = post.id
  card.dataset.pane = pane

  const m = post.matches
  const matchLabel = m
    ? `${m.team_a?.name ?? '?'} ${m.score_a} – ${m.score_b} ${m.team_b?.name ?? '?'}`
    : null

  const captionText = post.caption ?? ''
  const escCaption = escapeHtml(captionText)
  const viewBody = captionText
    ? escCaption
    : '<span class="empty">Body will be built by worker from match data</span>'

  const payload = post.payload_json && typeof post.payload_json === 'object' ? post.payload_json : {}
  const isAiImg = AI_IMAGE_POST_TYPES.has(post.post_type)
  const canGenImg = isAiImg && post.status !== 'published'
  const genLabel = post.bg_image_url ? 'Regenerate image' : 'Generate image'
  const imgMeta = isAiImg
    ? `<div class="img-meta">Style: <strong>${escapeHtml(String(payload.style_pack ?? 'regular'))}</strong> · AI bg: ${payload.generate_image === false ? 'off' : 'on'}${
        payload.ai_bg_generated_at
          ? ` · Last gen: ${escapeHtml(new Date(payload.ai_bg_generated_at).toLocaleString())}`
          : ''
      }</div>`
    : ''

  card.innerHTML = `
    <div class="card-row" style="margin-bottom:10px">
      <div class="card-meta">
        <span class="badge ${STATUS_BADGE[post.status] ?? ''}">${escapeHtml(post.status)}</span>
        <span style="color:var(--muted);font-size:12px;text-transform:capitalize">${escapeHtml((post.post_type ?? '').replace(/_/g,' '))}</span>
        ${post.scheduled_for ? `<span style="color:var(--muted);font-size:12px">· ${escapeHtml(new Date(post.scheduled_for).toLocaleString())}</span>` : ''}
        ${matchLabel ? `<span class="match-label">${escapeHtml(matchLabel)}</span>` : ''}
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        ${post.x_post_id ? `<a class="x-link" href="https://x.com/i/web/status/${escapeHtml(post.x_post_id)}" target="_blank" rel="noopener">View on X ↗</a>` : ''}
      </div>
    </div>
    ${imgMeta}
    ${post.bg_image_url ? `<img class="preview-img" src="${escapeHtml(post.bg_image_url)}" alt="card">` : ''}

    <div class="view-mode" data-view>
      <div class="caption-box ${captionText ? '' : 'empty'}">${viewBody}</div>
      <div class="actions">
        <button type="button" class="btn btn-ghost btn-sm" data-action="edit" data-id="${escapeHtml(post.id)}">Edit</button>
        ${canGenImg ? `<button type="button" class="btn btn-ghost btn-sm" data-action="generate-image" data-id="${escapeHtml(post.id)}">${escapeHtml(genLabel)}</button>` : ''}
        ${['pending','draft'].includes(post.status) ? `<button type="button" class="btn btn-primary btn-sm" data-action="publish-now" data-id="${escapeHtml(post.id)}">Post now</button>` : ''}
        ${post.status === 'scheduled' ? `<button type="button" class="btn btn-primary btn-sm" data-action="publish-now" data-id="${escapeHtml(post.id)}">Post now</button>` : ''}
        ${post.status === 'failed' ? `
          <button type="button" class="btn btn-amber btn-sm" data-action="publish-now" data-id="${escapeHtml(post.id)}">Retry</button>
          <button type="button" class="btn btn-danger btn-sm" data-action="dismiss" data-id="${escapeHtml(post.id)}">Dismiss</button>
        ` : ''}
      </div>
      ${post.error ? `<div class="error-box">Error: ${escapeHtml(post.error)}</div>` : ''}
    </div>
  `
  return card
}

document.getElementById('app').addEventListener('click', async e => {
  const btn = e.target.closest('button[data-action]')
  if (!btn) return
  const id = btn.dataset.id
  const action = btn.dataset.action
  const card = btn.closest('.card')
  const pane = card?.dataset.pane || activeListPane

  if (action === 'edit') {
    const post = postsById.get(id)
    if (!post) return
    startEdit(card, post)
  }
  if (action === 'generate-image') {
    const btn = e.target.closest('button[data-action="generate-image"]')
    if (btn) btn.disabled = true
    try {
      await api(`/api/posts/${id}/generate-image`, { method: 'POST', body: '{}' })
      if (pane === 'queue') loadQueue()
      else loadHistory()
    } catch (err) {
      alert(err instanceof Error ? err.message : String(err))
      if (btn) btn.disabled = false
    }
    return
  }
  if (action === 'save-image-settings') {
    const bgEl = document.getElementById(`edit-bg-${id}`)
    const spEl = document.getElementById(`edit-sp-${id}`)
    const svEl = document.getElementById(`edit-sv-${id}`)
    const giEl = document.getElementById(`edit-gi-${id}`)
    const bg = bgEl ? bgEl.value.trim() : ''
    await api(`/api/posts/${id}`, {
      method: 'PATCH',
      body: JSON.stringify({
        bg_image_url: bg || null,
        payload_patch: {
          style_pack: spEl ? spEl.value : 'regular',
          style_version: svEl ? parseInt(svEl.value, 10) || 1 : 1,
          generate_image: giEl ? giEl.checked : true,
        },
      }),
    })
    if (pane === 'queue') loadQueue()
    else loadHistory()
    return
  }
  if (action === 'publish-now') {
    await api(`/api/posts/${id}/publish-now`, { method: 'POST' })
    if (pane === 'queue') loadQueue()
    else loadHistory()
  }
  if (action === 'dismiss') {
    await api(`/api/posts/${id}`, { method: 'PATCH', body: JSON.stringify({ status: 'failed' }) })
    if (pane === 'queue') loadQueue()
    else loadHistory()
  }
  if (action === 'save-draft') {
    const caption = card.querySelector('textarea').value
    await api(`/api/posts/${id}`, { method: 'PATCH', body: JSON.stringify({ caption, status: 'draft' }) })
    if (pane === 'queue') loadQueue()
    else loadHistory()
  }
  if (action === 'save-publish') {
    const caption = card.querySelector('textarea').value
    await api(`/api/posts/${id}`, { method: 'PATCH', body: JSON.stringify({ caption }) })
    await api(`/api/posts/${id}/publish-now`, { method: 'POST' })
    if (pane === 'queue') loadQueue()
    else loadHistory()
  }
  if (action === 'cancel-edit') {
    if (pane === 'queue') loadQueue()
    else loadHistory()
  }
})

function startEdit(card, post) {
  const view = card.querySelector('[data-view]')
  const id = post.id
  const cap = post.caption ?? ''
  const p = post.payload_json && typeof post.payload_json === 'object' ? post.payload_json : {}
  const spOpts = STUDIO_STYLE_PACKS.map(sp => {
    const sel = (p.style_pack || 'regular') === sp ? ' selected' : ''
    return `<option value="${sp}"${sel}>${escapeHtml(sp.replace(/_/g, ' '))}</option>`
  }).join('')
  const giChecked = p.generate_image !== false ? ' checked' : ''
  const imgBlock = AI_IMAGE_POST_TYPES.has(post.post_type)
    ? `
    <p style="margin-top:14px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Image</p>
    <label class="field">
      <span>Background image URL</span>
      <input id="edit-bg-${escapeHtml(id)}" type="url" placeholder="https://…" value="${escapeHtml(post.bg_image_url ?? '')}">
    </label>
    <div class="form-grid" style="margin-top:10px">
      <label class="field">

async function submitAnnouncement(asDraft) {
  const caption = document.getElementById('a-caption').value.trim()
  const t = document.getElementById('a-type').value
  const isAiAnnouncement = t.startsWith('announcement_')
  if (!caption && !isAiAnnouncement) return

  const sched = document.getElementById('a-schedule').value
  let scheduled_for = sched ? new Date(sched).toISOString() : null

  const body = {
    type: t,
    caption: caption || undefined,
    hashtags: document.getElementById('a-tags').value,
    scheduled_for,
    draft: asDraft,
  }
  if (isAiAnnouncement) {
    body.generate_image = true
    body.payload_json = {
      season: 'Season',
      cta: 'lba.gg',
      vibe: 'esports_2k',
    }
  }

  await api('/api/posts', {
    method: 'POST',
    body: JSON.stringify(body),
  })

  document.getElementById('a-success').style.display = 'block'
  setTimeout(() => showTab('queue'), 1000)
}

async function loadPolicies() {
  const el = document.getElementById('pane-policies')
  el.innerHTML = '<div class="empty-state"><div class="spinner"></div></div>'

  const { leagues, policies } = await api('/api/policies')

  el.innerHTML = `
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
      <button type="button" class="btn btn-primary" id="run-plan-job">Run plan job</button>

    </div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:20px">
      Controls which leagues auto-post when a game is verified.
      Use <strong>Link X</strong> to run 3-legged OAuth and store tokens in
      <code style="background:rgba(255,255,255,.06);padding:1px 5px;border-radius:4px">webhook_config</code>
      (<code style="background:rgba(255,255,255,.06);padding:1px 5px;border-radius:4px">x_access_token</code> + <code style="background:rgba(255,255,255,.06);padding:1px 5px;border-radius:4px">x_access_secret</code>).
      Register the callback URL from <code style="background:rgba(255,255,255,.06);padding:1px 5px;border-radius:4px">README</code> in the X developer app.
    </p>
    <div class="card" id="policies-card"></div>
  `
  const card = document.getElementById('policies-card')
  const planBtn = el.querySelector('#run-plan-job')
  const planSt = el.querySelector('#plan-job-status')
  planBtn?.addEventListener('click', async () => {
    if (planSt) planSt.textContent = 'Running…'
    try {
      const r = await api('/api/jobs/plan', { method: 'POST' })
      const errPart = r.errors?.length ? `; errors: ${r.errors.join('; ')}` : ''
      if (planSt) planSt.textContent = `Inserted ${r.inserted ?? 0}${errPart}`
    } catch (e) {
      if (planSt) planSt.textContent = e instanceof Error ? e.message : String(e)
    }
  })

  card.innerHTML = (leagues || []).map(lg => {
    const pol = policies.find(p => p.league_id === lg.id) ?? {}
    const autoPost = pol.auto_post_verified_games ?? false
    const hasCredentials = lg.has_x_credentials === true
    const name = escapeHtml(lg.league ?? lg.id)
    return `
      <div class="toggle-row">
        <div class="toggle-info">
          <strong>${name}</strong>
          <small>${hasCredentials ? 'X tokens in webhook_config' : '⚠ Missing x_access_token / x_access_secret in webhook_config'}</small>
        </div>
        <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
          <button type="button" class="btn btn-ghost btn-sm" data-link-x="${escapeHtml(lg.id)}">Link X</button>
          <label class="toggle">
            <input type="checkbox" ${autoPost ? 'checked' : ''} data-policy-toggle data-league="${escapeHtml(lg.id)}">
            <span class="slider"></span>
          </label>
        </div>
      </div>
    `
  }).join('') || '<div class="empty-state">No leagues.</div>'

  card.addEventListener('change', async ev => {
    const inp = ev.target.closest('input[data-policy-toggle]')
    if (!inp) return
    await api(`/api/policies/${inp.dataset.league}`, {
      method: 'PATCH',
      body: JSON.stringify({ auto_post_verified_games: inp.checked })
    })
  })

  card.addEventListener('click', async ev => {
    const btn = ev.target.closest('[data-link-x]')
    if (!btn) return
    ev.preventDefault()
    const id = btn.getAttribute('data-link-x')
    if (!id) return
    btn.disabled = true
    try {
      await linkXAccount(id)
    } catch (e) {
      alert(e instanceof Error ? e.message : String(e))
      btn.disabled = false
    }
  })
}

function formatYmd(iso) {
  if (!iso) return new Date().toISOString().split('T')[0]
  const d = new Date(iso)
  return Number.isNaN(d.getTime()) ? new Date().toISOString().split('T')[0] : d.toISOString().split('T')[0]
}

async function submitStudioPost() {
  const leagueId = document.getElementById('studio-league').value.trim()
  if (!leagueId) {
    alert('Select a league.')
    return
  }
  const activeTab = document.querySelector('#studio-subtabs .tab.active')
  const activeType = activeTab ? activeTab.dataset.studioType : 'final_score'
  const style_pack = document.getElementById('studio-shared-style-pack').value
  const style_version = parseInt(document.getElementById('studio-shared-sv').value, 10) || 1
  const generate_image = document.getElementById('studio-shared-gi').checked
  const draft = document.getElementById('studio-shared-draft').checked
  const schedRaw = document.getElementById('studio-shared-sched').value
  const scheduled_for = schedRaw ? new Date(schedRaw).toISOString() : null
  const caption = document.getElementById('studio-shared-caption').value.trim()
  const hashtags = document.getElementById('studio-shared-tags').value

  /** @type {Record<string, unknown>} */
  let payload_json = { league_id: leagueId }
  const type = activeType

  if (type === 'announcement') {
    const kind = document.getElementById('studio-ann-kind').value
    const season = document.getElementById('studio-ann-season').value.trim()
    const cta = document.getElementById('studio-ann-cta').value.trim()
    if (!season || !cta) {
      alert('Announcements require season and cta.')
      return
    }
    const resultLinesRaw = document.getElementById('studio-ann-result-lines').value
    const result_lines = resultLinesRaw.split('\n').map(s => s.trim()).filter(Boolean)
    const annBody = {
      season,
      season_id: document.getElementById('studio-ann-season_id').value.trim() || undefined,
      draft_date: document.getElementById('studio-ann-draft_date').value.trim() || undefined,
      combine_dates: document.getElementById('studio-ann-combine').value.trim() || undefined,
      prize_pool: document.getElementById('studio-ann-prize').value.trim() || undefined,
      cta,
      cta_label: document.getElementById('studio-ann-cta-label').value.trim() || undefined,
      league_logo: document.getElementById('studio-ann-league-logo').value.trim() || undefined,
      league_id: leagueId,
      vibe: document.getElementById('studio-ann-vibe').value,
      headline_override: document.getElementById('studio-ann-headline').value.trim() || undefined,
      result_lines: result_lines.length ? result_lines : undefined,
      caption: caption || undefined,
      hashtags,
      scheduled_for,
      draft,
      generate_image,
      style_pack,
      style_version,
      skip_dedupe: document.getElementById('studio-ann-skip-dedupe').checked,
    }
    try {
      const created = await api(`/api/announcements/${kind}`, { method: 'POST', body: JSON.stringify(annBody) })
      studioLastCreatedId = created.id
      document.getElementById('studio-result').style.display = 'block'
      document.getElementById('studio-result-id').textContent = created.id
      document.getElementById('studio-result-msg').textContent = ''
    } catch (e) {
      alert(e instanceof Error ? e.message : String(e))
    }
    return
  }

  if (type === 'final_score') {
    payload_json = {
      ...payload_json,
      match_id: document.getElementById('studio-fs-match_id').value.trim(),
      home_team: document.getElementById('studio-fs-home_team').value.trim(),
      away_team: document.getElementById('studio-fs-away_team').value.trim(),
      home_score: Number(document.getElementById('studio-fs-home_score').value) || 0,
      away_score: Number(document.getElementById('studio-fs-away_score').value) || 0,
      date: document.getElementById('studio-fs-date').value.trim(),
      home_team_logo: document.getElementById('studio-fs-home_logo').value.trim() || null,
      away_team_logo: document.getElementById('studio-fs-away_logo').value.trim() || null,
      league_logo: document.getElementById('studio-fs-league_logo').value.trim() || null,
      boxscore_url: document.getElementById('studio-fs-boxscore').value.trim() || null,
    }
    if (!payload_json.match_id || !payload_json.home_team || !payload_json.away_team) {
      alert('final_score requires match_id, home_team, and away_team.')
      return
    }
  } else if (type === 'player_of_game') {
    payload_json = {
      ...payload_json,
      match_id: document.getElementById('studio-pog-match_id').value.trim(),
      player_name: document.getElementById('studio-pog-player_name').value.trim(),
      stat_line: document.getElementById('studio-pog-stat_line').value.trim(),
      team_name: document.getElementById('studio-pog-team_name').value.trim(),
      date: document.getElementById('studio-pog-date').value.trim(),
      team_logo: document.getElementById('studio-pog-team_logo').value.trim() || null,
      league_logo: document.getElementById('studio-pog-league_logo').value.trim() || null,
    }
    if (!payload_json.match_id || !payload_json.player_name || !payload_json.team_name) {
      alert('player_of_game requires match_id, player_name, and team_name.')
      return
    }
  } else {
    const week_label = document.getElementById('studio-pr-week').value.trim()
    const teams = []
    document.querySelectorAll('#pr-rows .pr-row').forEach(row => {
      const rank = parseInt(row.querySelector('.pr-rank').value, 10)
      const team_name = row.querySelector('.pr-name').value.trim()
      const record = row.querySelector('.pr-record').value.trim()
      const team_logo = row.querySelector('.pr-logo').value.trim() || null
      if (team_name) {
        teams.push({
          rank: Number.isFinite(rank) ? rank : teams.length + 1,
          team_name,
          record,
          team_logo,
        })
      }
    })
    if (!week_label || !teams.length) {
      alert('Power rankings need a week label and at least one team row.')
      return
    }
    payload_json = {
      ...payload_json,
      week_label,
      league_logo: document.getElementById('studio-pr-league_logo').value.trim() || null,
      teams,
    }
  }

  const body = {
    type,
    caption: caption || undefined,
    hashtags,
    scheduled_for,
    draft,
    league_id: leagueId,
    generate_image,
    style_pack,
    style_version,
    payload_json,
  }

  try {
    const created = await api('/api/posts', { method: 'POST', body: JSON.stringify(body) })
    studioLastCreatedId = created.id
    document.getElementById('studio-result').style.display = 'block'
    document.getElementById('studio-result-id').textContent = created.id
    document.getElementById('studio-result-msg').textContent = ''
  } catch (e) {
    alert(e instanceof Error ? e.message : String(e))
  }
}

  <div class="tab" data-studio-type="weekly_power_rankings">Power rankings</div>
  <div class="tab" data-studio-type="announcement">Announcements</div>
</div>

<div class="studio-type-pane active" data-studio-type="final_score">
  <div class="card">
    <h3 style="font-size:13px;margin-bottom:8px">Verified match suggestions</h3>

    <h3 style="font-size:13px;margin:16px 0 8px">Payload</h3>
    <div class="form-grid">
      <label class="field"><span>match_id</span><input id="studio-fs-match_id" placeholder="UUID"></label>
      <label class="field"><span>date (YYYY-MM-DD)</span><input id="studio-fs-date" placeholder="2025-03-20"></label>
      <label class="field"><span>home_team</span><input id="studio-fs-home_team"></label>
      <label class="field"><span>away_team</span><input id="studio-fs-away_team"></label>
      <label class="field"><span>home_score</span><input type="number" id="studio-fs-home_score" value="0"></label>
      <label class="field"><span>away_score</span><input type="number" id="studio-fs-away_score" value="0"></label>
      <label class="field"><span>home_team_logo URL</span><input id="studio-fs-home_logo"></label>
      <label class="field"><span>away_team_logo URL</span><input id="studio-fs-away_logo"></label>
      <label class="field"><span>league_logo URL</span><input id="studio-fs-league_logo"></label>

</div>

<div class="studio-type-pane" data-studio-type="player_of_game">
  <div class="card">
    <h3 style="font-size:13px;margin-bottom:8px">MVP suggestions</h3>
    <div id="studio-pog-suggestions"><p class="img-meta">Select a league.</p></div>
    <h3 style="font-size:13px;margin:16px 0 8px">Payload</h3>
    <div class="form-grid">
      <label class="field"><span>match_id</span><input id="studio-pog-match_id"></label>
      <label class="field"><span>date</span><input id="studio-pog-date"></label>
      <label class="field"><span>player_name</span><input id="studio-pog-player_name"></label>
      <label class="field"><span>team_name</span><input id="studio-pog-team_name"></label>
      <label class="field form-grid full"><span>stat_line</span><input id="studio-pog-stat_line"></label>
      <label class="field"><span>team_logo URL</span><input id="studio-pog-team_logo"></label>
      <label class="field"><span>league_logo URL</span><input id="studio-pog-league_logo"></label>

  </div>
</div>

<div class="studio-type-pane" data-studio-type="weekly_power_rankings">
  <div class="card">
    <div class="form-grid full">
      <label class="field"><span>week_label</span><input id="studio-pr-week" placeholder="Week 3"></label>
    </div>
    <label class="field" style="margin-top:10px"><span>league_logo URL</span><input id="studio-pr-league_logo"></label>
    <div class="actions" style="margin:12px 0">
      <button type="button" class="btn btn-ghost btn-sm" id="pr-import">Import top 10</button>
      <button type="button" class="btn btn-ghost btn-sm" id="pr-add-row">Add team row</button>
    </div>
    <div id="pr-rows"></div>
  </div>
</div>

<div class="studio-type-pane" data-studio-type="announcement">
  <div class="card">
    <p style="color:var(--muted);font-size:12px;margin-bottom:12px">Creates <code style="background:rgba(255,255,255,.06);padding:1px 5px;border-radius:4px">announcement_*</code> posts with AI background + Satori overlay (1200×630). Dedupes on <code style="background:rgba(255,255,255,.06);padding:1px 5px;border-radius:4px">season_id</code> or <code style="background:rgba(255,255,255,.06);padding:1px 5px;border-radius:4px">season</code> per league + type.</p>
    <div class="form-grid">
      <label class="field">
        <span>Kind</span>
        <select id="studio-ann-kind">
          <option value="registration">registration</option>
          <option value="draft">draft</option>
          <option value="results">results</option>
        </select>
      </label>
      <label class="field">
        <span>vibe</span>
        <select id="studio-ann-vibe">
          <option value="esports_2k">esports_2k</option>
          <option value="luxury">luxury</option>
          <option value="hype">hype</option>
        </select>
      </label>
      <label class="field form-grid full"><span>season (display)</span><input id="studio-ann-season" placeholder="Season 2"></label>
      <label class="field form-grid full"><span>season_id (UUID, optional, dedupe)</span><input id="studio-ann-season_id" placeholder="league_seasons.id"></label>
      <label class="field"><span>draft_date</span><input id="studio-ann-draft_date" placeholder="April 3"></label>
      <label class="field"><span>combine_dates</span><input id="studio-ann-combine" placeholder="March 27–29"></label>
      <label class="field"><span>prize_pool</span><input id="studio-ann-prize" placeholder="$1500"></label>
      <label class="field form-grid full"><span>cta</span><input id="studio-ann-cta" placeholder="lba.gg/signup/player"></label>
      <label class="field"><span>cta_label</span><input id="studio-ann-cta-label" placeholder="Sign Up Now"></label>
      <label class="field form-grid full"><span>league_logo URL</span><input id="studio-ann-league-logo"></label>
      <label class="field form-grid full"><span>headline_override</span><input id="studio-ann-headline" placeholder="optional"></label>
    </div>
    <label class="field form-grid full" style="margin-top:10px">
      <span>result_lines (results only, one per line)</span>
      <textarea id="studio-ann-result-lines" rows="3" placeholder="Champion: …"></textarea>
    </label>
    <label class="field" style="flex-direction:row;align-items:center;gap:10px;margin-top:10px">
      <input type="checkbox" id="studio-ann-skip-dedupe">
      <span style="font-size:13px;color:var(--text);text-transform:none;letter-spacing:0">Skip dedupe (409)</span>
    </label>
  </div>
</div>

<div class="card">
  <h3 style="font-size:13px;margin-bottom:10px">Schedule & caption</h3>
  <div class="form-grid">
    <label class="field">
      <span>Style pack</span>
      <select id="studio-shared-style-pack">${packOpts}</select>
    </label>
    <label class="field">
      <span>Style version</span>
      <input type="number" id="studio-shared-sv" min="1" step="1" value="1">
    </label>
    <label class="field">
      <span>Schedule (optional)</span>
      <input type="datetime-local" id="studio-shared-sched">
    </label>
    <label class="field" style="flex-direction:row;align-items:center;gap:10px;padding-top:20px">
      <input type="checkbox" id="studio-shared-gi" checked>
      <span style="font-size:13px;color:var(--text);text-transform:none;letter-spacing:0">Generate AI image</span>
    </label>
    <label class="field" style="flex-direction:row;align-items:center;gap:10px;padding-top:20px">
      <input type="checkbox" id="studio-shared-draft">
      <span style="font-size:13px;color:var(--text);text-transform:none;letter-spacing:0">Draft only</span>
    </label>
  </div>
  <label class="field form-grid full" style="margin-top:10px">
    <span>Caption (optional)</span>
    <textarea id="studio-shared-caption" rows="3"></textarea>
    <div class="char-count" id="studio-cap-cc">0/280</div>
  </label>
  <label class="field" style="margin-top:10px">
    <span>Hashtags (optional)</span>
    <input id="studio-shared-tags" placeholder="#LBA">
  </label>
  <div class="actions" style="margin-top:14px">
    <button type="button" class="btn btn-primary" id="studio-submit">Create post</button>
  </div>
  <div id="studio-result" style="display:none;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
    <p style="font-size:13px">Created <code id="studio-result-id" style="background:rgba(255,255,255,.06);padding:2px 6px;border-radius:4px"></code></p>
    <p id="studio-result-msg" class="img-meta"></p>
    <div class="actions">
      <button type="button" class="btn btn-primary btn-sm" id="studio-gen-now">Generate image now</button>
      <button type="button" class="btn btn-ghost btn-sm" id="studio-go-queue">Open queue</button>
    </div>
  </div>
</div>
`
    document.getElementById('studio-subtabs').addEventListener('click', ev => {
      const t = ev.target.closest('.tab[data-studio-type]')
      if (!t) return
      setStudioPostType(t.dataset.studioType)
    })
    document.getElementById('studio-league').addEventListener('change', onStudioLeagueChange)
    document.getElementById('studio-submit').addEventListener('click', submitStudioPost)
    document.getElementById('studio-gen-now').addEventListener('click', studioGenerateLastCreated)
    document.getElementById('studio-go-queue').addEventListener('click', () => showTab('queue'))
    document.getElementById('pr-add-row').addEventListener('click', () => addPrRow('', '', '', ''))
    document.getElementById('pr-import').addEventListener('click', importPowerRankings)
    document.getElementById('studio-shared-caption').addEventListener('input', function () {
      document.getElementById('studio-cap-cc').textContent = `${this.value.length}/280`
    })
    studioPaneReady = true
  }
  const { leagues } = await api('/api/policies')
  const sel = document.getElementById('studio-league')
  const prev = sel.value
  sel.innerHTML = '<option value="">Select league…</option>' + (leagues || []).map(lg =>
    `<option value="${escapeHtml(lg.id)}">${escapeHtml(lg.league ?? lg.id)}</option>`
  ).join('')
  if (prev && [...sel.options].some(o => o.value === prev)) sel.value = prev
}

bootstrapSession()
</script>
</body>
</html>
