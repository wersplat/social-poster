<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1350">
  <style>
    /* AI image is the background; text is composited for crisp, accurate copy. */
    body {
      display: block;
      padding: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
    }
    .hero-text-layer {
      position: absolute;
      inset: 0;
      z-index: 15;
      pointer-events: none;
    }
    .hero-kicker {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #fbbf24;
      margin-bottom: 12px;
    }
    /* Dark panel so name/stats stay readable on AI white bars or busy art */
    .hero-headline-panel {
      background: rgba(15, 23, 42, 0.88);
      border: 2px solid rgba(251, 191, 36, 0.55);
      border-radius: 18px;
      padding: 22px 28px 20px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
    }
    .hero-headline {
      position: absolute;
      top: 88px;
      left: 36px;
      right: 36px;
      padding-left: 96px;
      padding-right: 96px;
      text-align: center;
      box-sizing: border-box;
    }
    .hero-player-name {
      font-size: 48px;
      font-weight: 800;
      line-height: 1.15;
      color: #ffffff;
      margin-bottom: 10px;
    }
    .hero-stat-line {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #fde68a;
    }
    .hero-team-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-top: 18px;
    }
    .hero-team-logo {
      width: 56px;
      height: 56px;
      object-fit: contain;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
    }
    .hero-team-logo.logo-empty { display: none; }
    .hero-team-name {
      font-size: 26px;
      font-weight: 600;
      color: #e2e8f0;
    }
    /* Narrative quote on the right (comic bubble); stats stay in headline panel only */
    .hero-quote-wrap {
      display: {{hero_caption_wrap_display}};
      position: absolute;
      right: 28px;
      left: auto;
      top: 380px;
      width: min(430px, 46%);
      max-height: 460px;
    }
    .hero-bubble {
      position: relative;
      background: rgba(255, 255, 255, 0.96);
      border: 3px solid #0f172a;
      border-radius: 22px 22px 10px 22px;
      padding: 20px 22px 22px;
      box-shadow:
        4px 4px 0 rgba(15, 23, 42, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.85);
    }
    /* Small tail pointing toward center art (comic speech bubble) */
    .hero-bubble::after {
      content: "";
      position: absolute;
      left: -14px;
      bottom: 28px;
      width: 0;
      height: 0;
      border: 12px solid transparent;
      border-right-color: #0f172a;
      border-left: 0;
      filter: drop-shadow(-1px 2px 0 rgba(15, 23, 42, 0.2));
    }
    .hero-bubble::before {
      content: "";
      position: absolute;
      left: -9px;
      bottom: 31px;
      width: 0;
      height: 0;
      border: 9px solid transparent;
      border-right-color: rgba(255, 255, 255, 0.96);
      border-left: 0;
      z-index: 1;
    }
    .hero-caption {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      line-height: 1.4;
      color: #0f172a;
      font-family: system-ui, -apple-system, sans-serif;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .hero-league-logo {
      position: absolute;
      top: 32px;
      left: 32px;
      width: 88px;
      height: 88px;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.6));
      z-index: 20;
    }
    .hero-league-logo.logo-empty { display: none; }
    .hero-date {
      position: absolute;
      bottom: 28px;
      right: 36px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.8);
      font-family: system-ui, -apple-system, sans-serif;
      z-index: 20;
    }
  </style>
</head>
<body>
  <div class="hero-text-layer">
    <div class="hero-headline">
      <div class="hero-headline-panel">
        <div class="hero-kicker">PLAYER OF THE GAME</div>
        <div class="hero-player-name">{{player_name}}</div>
        <div class="hero-stat-line">{{stat_line}}</div>
        <div class="hero-team-row">
          <img class="hero-team-logo" src="{{team_logo}}" alt="" onerror="this.classList.add('logo-empty')">
          <div class="hero-team-name">{{team_name}}</div>
        </div>
      </div>
    </div>
    <aside class="hero-quote-wrap">
      <div class="hero-bubble">
        <p class="hero-caption">{{hero_caption}}</p>
      </div>
    </aside>
  </div>
  <img class="hero-league-logo" src="{{league_logo}}" alt="" onerror="this.classList.add('logo-empty')">
  <div class="hero-date">{{date}}</div>
</body>
</html>
