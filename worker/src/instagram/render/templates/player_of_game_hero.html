<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1350">
  <style>
    body {
      display: block;
      padding: 0;
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      position: relative;
    }
    /* Opaque band — fully covers any AI ghost text/stat labels in the lower third */
    .hero-bottom-panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 15;
      min-height: 460px;
      padding: 32px 40px 40px;
      background: #0f172a;
      border-top: 1px solid rgba(251, 191, 36, 0.28);
      box-shadow: 0 -20px 40px rgba(0, 0, 0, 0.4);
      pointer-events: none;
      box-sizing: border-box;
    }
    .hero-kicker {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: #fbbf24;
      text-align: center;
      margin-bottom: 10px;
    }
    .hero-player-name {
      font-size: 40px;
      font-weight: 800;
      line-height: 1.15;
      color: #ffffff;
      text-align: center;
      margin-bottom: 8px;
    }
    .hero-team-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .hero-team-logo {
      width: 48px;
      height: 48px;
      object-fit: contain;
    }
    .hero-team-logo.logo-empty { display: none; }
    .hero-team-name {
      font-size: 24px;
      font-weight: 600;
      color: #e2e8f0;
    }
    .hero-stat-line {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #fde68a;
      text-align: center;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 2px solid rgba(251, 191, 36, 0.35);
    }
    .hero-quote-section {
      display: {{hero_quote_section_display}};
      max-width: 920px;
      margin: 0 auto;
    }
    .hero-caption {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      line-height: 1.45;
      color: #f1f5f9;
      font-family: system-ui, -apple-system, sans-serif;
      white-space: pre-wrap;
      word-break: break-word;
      text-align: center;
    }
    .hero-league-brand {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 25;
      padding: 12px 14px;
      background: #0f172a;
      border-radius: 16px;
      border: 2px solid rgba(251, 191, 36, 0.42);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.55);
    }
    .hero-league-brand.logo-empty { display: none; }
    .hero-league-logo {
      display: block;
      width: 96px;
      height: 96px;
      object-fit: contain;
    }
    .hero-date {
      position: absolute;
      bottom: 28px;
      right: 36px;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.8);
      font-family: system-ui, -apple-system, sans-serif;
      z-index: 25;
    }
  </style>
</head>
<body>
  <div class="hero-league-brand">
    <img class="hero-league-logo" src="{{league_logo}}" alt="" onerror="this.closest('.hero-league-brand')?.classList.add('logo-empty')">
  </div>
  <div class="hero-bottom-panel">
    <div class="hero-kicker">PLAYER OF THE GAME</div>
    <div class="hero-player-name">{{player_name}}</div>
    <div class="hero-team-row">
      <img class="hero-team-logo" src="{{team_logo}}" alt="" onerror="this.classList.add('logo-empty')">
      <div class="hero-team-name">{{team_name}}</div>
    </div>
    <div class="hero-stat-line">{{stat_line}}</div>
    <div class="hero-quote-section">
      <p class="hero-caption">{{hero_caption}}</p>
    </div>
  </div>
  <div class="hero-date">{{date}}</div>
</body>
</html>
