<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1350">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      width: 1080px; height: 1350px;
      background: #3b2d5c;
      color: #f5f2eb;
      display: flex; flex-direction: column;
      position: relative; overflow: hidden;
    }
    .scrim {
      position: absolute; inset: 0;
      background: #120c1e; opacity: 0.55;
    }
    .content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      width: 100%; height: 100%;
    }
    .logo-wrap {
      display: flex; justify-content: center;
      padding-top: 60px;
    }
    .logo { width: 100px; height: 120px; object-fit: contain; border-radius: 12px; }
    .logo:not([src]), .logo[src=""] { display: none; }
    .eyebrow {
      text-align: center; margin-top: 40px;
      font-size: 30px; font-weight: 600; color: #f0c75e;
      letter-spacing: 3px;
    }
    .headline-stack {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0;
    }
    .headline-line {
      font-size: 130px; font-weight: 700; color: #f5f2eb;
      text-align: center; letter-spacing: 7.8px;
      line-height: 1.08;
    }
    .gold-bar-wrap {
      display: flex; justify-content: center;
      margin-top: 20px;
    }
    .gold-bar { width: 200px; height: 4px; background: #f0c75e; }
    .subline {
      text-align: center; margin-top: 20px;
      font-size: 24px; font-weight: 400; color: #9b8bb4;
    }
    .cta-band {
      width: 100%; height: 170px;
      background: #f0c75e;
      display: flex; align-items: center; justify-content: center;
    }
    .cta-text {
      font-size: 44px; font-weight: 700; color: #120c1e;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="scrim"></div>
  <div class="content">
    <div class="logo-wrap">
      <img class="logo" src="{{league_logo}}" alt="" onerror="this.style.display='none'">
    </div>
    <div class="eyebrow">{{eyebrow}}</div>
    <div class="headline-stack">
      <div class="headline-line">{{headline_1}}</div>
      <div class="headline-line">{{headline_2}}</div>
      <div class="headline-line">{{headline_3}}</div>
    </div>
    <div class="gold-bar-wrap"><div class="gold-bar"></div></div>
    <div class="subline">{{subline}}</div>
    <div style="flex: 0 0 40px;"></div>
    <div class="cta-band">
      <div class="cta-text">{{cta_text}}</div>
    </div>
  </div>
</body>
</html>
