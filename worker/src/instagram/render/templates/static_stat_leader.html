<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1350">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      width: 1080px; height: 1350px;
      background: #3b2d5c;
      color: #f5f2eb;
      display: flex; flex-direction: column;
      position: relative; overflow: hidden;
    }
    .scrim {
      position: absolute; inset: 0;
      background: #120c1e; opacity: 0.50;
    }
    .content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      width: 100%; height: 100%;
    }
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 40px 40px 0 40px;
    }
    .logo { width: 100px; height: 120px; object-fit: contain; border-radius: 12px; }
    .logo:not([src]), .logo[src=""] { display: none; }
    .season-label {
      font-size: 22px; font-weight: 600; color: #9b8bb4;
      letter-spacing: 2px; text-align: right;
    }
    .main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .stat-category {
      font-size: 30px; font-weight: 600; color: #f0c75e;
      letter-spacing: 3px; text-align: center;
    }
    .big-number {
      font-size: 320px; font-weight: 700; color: #f5f2eb;
      line-height: 0.9; text-align: center;
    }
    .player-name {
      font-size: 60px; font-weight: 700; color: #f5f2eb;
      text-align: center; margin-top: 24px;
    }
    .team-name {
      font-size: 26px; font-weight: 400; color: #9b8bb4;
      text-align: center; margin-top: 8px;
    }
    .subline-band {
      width: 100%; height: 80px;
      background: #1a2744; position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .subline-band .gold-accent {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 4px; background: #f0c75e;
    }
    .subline-text {
      font-size: 20px; font-weight: 600; color: #9b8bb4;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="scrim"></div>
  <div class="content">
    <div class="top-bar">
      <img class="logo" src="{{league_logo}}" alt="" onerror="this.style.display='none'">
      <div class="season-label">{{season_label}}</div>
    </div>
    <div class="main">
      <div class="stat-category">{{stat_category}}</div>
      <div class="big-number">{{big_number}}</div>
      <div class="player-name">{{player_name}}</div>
      <div class="team-name">{{team_name}}</div>
    </div>
    <div class="subline-band">
      <div class="gold-accent"></div>
      <div class="subline-text">{{subline}}</div>
    </div>
  </div>
</body>
</html>
