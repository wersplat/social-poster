<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920">
  <style>
    body { padding: 0; justify-content: stretch; }
    .header-strip {
      flex-shrink: 0; height: 100px;
      background: var(--lba-midnight-court-blue);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 700; letter-spacing: 0.05em;
    }
    .boxscore-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 24px; overflow: hidden;
    }
    .boxscore-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }
  </style>
</head>
<body>
  <div class="header-strip">{{match_label}}</div>
  <div class="boxscore-wrap">
    <img src="{{boxscore_image_url}}" alt="Box score">
  </div>
</body>
</html>
