<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920">
  <style>
    .outro-logo { width: 210px; height: 210px; object-fit: contain; margin-bottom: 40px; }
    .outro-tagline { font-size: 36px; font-weight: 700; margin-bottom: 24px; }
    .outro-cta { font-size: 28px; opacity: 0.9; }
  </style>
</head>
<body>
  <img class="outro-logo logo" src="{{league_logo}}" alt="LBA" onerror="this.classList.add('logo-empty')">
  <div class="outro-tagline">Legends Basketball Association</div>
  <div class="outro-cta">Follow for more</div>
</body>
</html>
